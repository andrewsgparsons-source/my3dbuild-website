<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My3DBuild Logo Export</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
    }
    
    .logo-export {
      width: 1200px;
      height: 1200px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
    }
    
    .hex {
      font-size: 400px;
      color: #2D5A7B;
      line-height: 1;
    }
    
    .text {
      font-family: 'Inter', sans-serif;
      font-size: 140px;
      font-weight: 700;
      color: #1C1917;
      letter-spacing: -2px;
    }
    
    .text strong {
      color: #2D5A7B;
    }

    .instructions {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #2D5A7B;
      color: white;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      max-width: 400px;
      font-size: 14px;
      line-height: 1.6;
    }

    .instructions h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
    }

    .instructions ol {
      margin: 0;
      padding-left: 20px;
    }

    .instructions li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <div class="instructions">
    <h3>📸 How to Export Logo</h3>
    <ol>
      <li><strong>Windows:</strong> Win+Shift+S, select the white square</li>
      <li><strong>Mac:</strong> Cmd+Shift+4, select the white square</li>
      <li>Save as PNG</li>
      <li>Upload to Google Ads</li>
    </ol>
    <p style="margin-top: 12px; font-size: 12px; opacity: 0.9;">This is exactly 1200×1200px (Google's recommended size)</p>
  </div>

  <div class="logo-export">
    <div class="hex">⬡</div>
    <div class="text">My<strong>3D</strong>Build</div>
  </div>

</body>
</html>
